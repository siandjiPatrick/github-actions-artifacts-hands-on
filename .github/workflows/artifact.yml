name: Workflow Demo

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create a text file
      run: echo "Hello, world!" > hello.txt

    - name: Archive text file
      uses: actions/upload-artifact@v4
      with:
        name: hello-artifact
        path: hello.txt

  download:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: download the text file from preview step
        uses: actions/download-artifact@v7
        with:
          name: hello-artifact
          path: ./artifact

      - name: Display the content of hello.txt
        run: echo ./artifacts/hello.txt